<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>russchords</title>
  <!-- Zero-flash color scheme: read persisted choice BEFORE React mounts so the
       <html> tag gets the right data attribute and Mantine variables resolve
       correctly on first paint. Keep this script in sync with the theme's
       `localStorageColorSchemeManager` key. -->
  <script>
    (function () {
      try {
        var key = 'russchords-color-scheme';
        var stored = localStorage.getItem(key);
        var scheme = stored === 'dark' || stored === 'light' ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-mantine-color-scheme', scheme);
      } catch (e) { /* localStorage disabled — ignore */ }
    })();
  </script>

  <script>(function (w, d, s, l, i) {
      w[l] = w[l] || []; w[l].push({
        'gtm.start':

      }); var f = d.getElementsByTagName(s)[0],
        j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
          'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', '%VITE_GTM_ID%');</script>
  <!-- End Google Tag Manager -->
</head>
