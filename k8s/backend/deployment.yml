apiVersion: apps/v1
kind: Deployment
metadata:
  name: russchords-backend-deployment
spec:
  selector:
    matchLabels:
      app: russchords-backend
  template:
    metadata:
      labels:
        app: russchords-backend
    spec:
      containers:
      - name: russchords-backend-container
        image: ghcr.io/ruskoloma/russchords-backend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "0.5"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: russchords-backend-config
        - secretRef:
            name: russchords-backend-secrets
      imagePullSecrets:
        - name: ghcr-pull
